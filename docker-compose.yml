services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: salary
      POSTGRES_PASSWORD: salary
      POSTGRES_DB: salary_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salary -d salary_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://salary:salary@db:5432/salary_db
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python -c 'from app.core.database import init_db; init_db()' &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  streamlit:
    build: .
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api
    command: streamlit run streamlit_app.py --server.port=8501 --server.address=0.0.0.0

volumes:
  postgres_data:
